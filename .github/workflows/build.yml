name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npx vsce package --no-dependencies

      - uses: actions/upload-artifact@v4
        with:
          name: helm-values-navigator
          path: helm-values-navigator-*.vsix
